name: MobileCommander
options:
  bundleIdPrefix: com.everbot
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk.git
    from: "11.0.0"
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS.git
    from: "7.1.0"

targets:
  MobileCommander:
    type: application
    platform: iOS
    sources:
      - Sources
      - path: Resources
        buildPhase: resources
        excludes:
          - Info.plist
          - MobileCommander.entitlements
    settings:
      base:
        INFOPLIST_FILE: Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.everbot.mobile-commander
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_ENTITLEMENTS: Resources/MobileCommander.entitlements
    dependencies:
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
      - package: Firebase
        product: FirebaseStorage
      - package: Firebase
        product: FirebaseMessaging
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift
