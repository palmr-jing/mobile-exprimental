name: MobileCommander
options:
  bundleIdPrefix: com.everbot
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk.git
    from: "11.0.0"

targets:
  MobileCommander:
    type: application
    platform: iOS
    sources:
      - Sources
    resources:
      - Resources
    settings:
      base:
        INFOPLIST_FILE: Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.everbot.mobile-commander
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        DEVELOPMENT_TEAM: ""
    dependencies:
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
      - package: Firebase
        product: FirebaseStorage

  MobileCommanderTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests/MobileCommanderTests
    settings:
      base:
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: "YES"
    dependencies:
      - target: MobileCommander

  MobileCommanderUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - Tests/MobileCommanderUITests
    settings:
      base:
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: "YES"
    dependencies:
      - target: MobileCommander
